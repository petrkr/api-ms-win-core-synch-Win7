name: build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.3.0

      - name: Build image
        run: |
          docker build -f Containerfile --target artifacts --output type=local,dest=out .

      - name: Upload x86
        uses: actions/upload-artifact@v4.6.2
        with:
          name: win7-x86
          path: out/x86
          if-no-files-found: error

      - name: Upload x64
        uses: actions/upload-artifact@v4.6.2
        with:
          name: win7-x64
          path: out/x64
          if-no-files-found: error
